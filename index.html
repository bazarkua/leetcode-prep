<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NeetCode 150 — Adil's Roadmap</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #161922;
    --node: #4F4ED8;
    --node-hover: #6968E5;
    --text: #ffffff;
    --muted: #8a8fa3;
    --easy: #38b676;
    --medium: #f0a91a;
    --hard: #d94545;
    --progress-bg: rgba(255,255,255,0.18);
    --progress-fill: #ffffff;
    --row-hover: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    line-height: 1.5;
  }
  header {
    padding: 32px 48px 16px;
    border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0 0 4px; font-size: 28px; font-weight: 600; letter-spacing: -0.01em; }
  header .sub { color: var(--muted); font-size: 14px; margin: 0 0 16px; }
  .stats { display: flex; gap: 24px; font-size: 14px; }
  .stats .pill {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
  }
  .stats strong { color: var(--text); font-weight: 600; }
  .stats .muted { color: var(--muted); }

  #tree-section {
    padding: 24px 0 8px;
    display: flex;
    justify-content: center;
    overflow-x: auto;
  }
  svg#tree { width: 1100px; max-width: 100%; height: auto; }
  .node rect.box {
    fill: var(--node);
    stroke: none;
    cursor: pointer;
    transition: fill 0.15s;
  }
  .node:hover rect.box { fill: var(--node-hover); }
  .node text {
    fill: var(--text);
    font-size: 12px;
    font-weight: 600;
    text-anchor: middle;
    dominant-baseline: middle;
    pointer-events: none;
  }
  .node rect.prog-bg { fill: var(--progress-bg); }
  .node rect.prog-fill { fill: var(--progress-fill); transition: width 0.3s; }
  .edge { fill: none; stroke: rgba(255,255,255,0.45); stroke-width: 1.5; }

  main { padding: 24px 48px 64px; max-width: 1100px; margin: 0 auto; }
  .topic { margin: 32px 0; }
  .topic h2 {
    font-size: 18px; font-weight: 600; margin: 0 0 12px;
    display: flex; align-items: center; gap: 12px;
    scroll-margin-top: 16px;
  }
  .topic h2 .count {
    font-size: 13px; color: var(--muted); font-weight: 500;
  }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
  tbody tr:hover { background: var(--row-hover); }
  td.status { width: 40px; text-align: center; font-size: 16px; }
  td.num { width: 60px; color: var(--muted); font-variant-numeric: tabular-nums; }
  td.diff { width: 80px; }
  td.notes { width: 60px; text-align: center; }
  td a { color: #88a8ff; text-decoration: none; }
  td a:hover { text-decoration: underline; }
  .diff-easy { color: var(--easy); }
  .diff-medium { color: var(--medium); }
  .diff-hard { color: var(--hard); }
  tr.solved td.title a { color: var(--muted); }
  tr.solved td.title { text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.2); }
  .check { color: var(--easy); }
  .uncheck { color: var(--muted); opacity: 0.5; }
  footer { padding: 24px 48px; color: var(--muted); font-size: 13px; border-top: 1px solid var(--border); }
  footer code { background: var(--panel); padding: 2px 6px; border-radius: 4px; }
</style>
</head>

const BOX_W = 150, BOX_H = 42;

// ===== RENDER =====
const topicMap = Object.fromEntries(TOPICS.map(t => [t.slug, t]));

function topicStats(t) {
  const solved = t.problems.filter(p => p[4]).length;
  return { solved, total: t.problems.length };
}

function renderTree() {
  const svg = document.getElementById("tree");
  let html = "";
  // edges
  for (const [a, b] of EDGES) {
    const p = topicMap[a], c = topicMap[b];
    const x1 = p.cx, y1 = p.cy + BOX_H/2;
    const x2 = c.cx, y2 = c.cy - BOX_H/2;
    const my = (y1 + y2) / 2;
    html += `<path class="edge" d="M ${x1} ${y1} C ${x1} ${my}, ${x2} ${my}, ${x2} ${y2}"/>`;
  }
  // nodes
  for (const t of TOPICS) {
    const { solved, total } = topicStats(t);
    const pct = total ? solved / total : 0;
    const x = t.cx - BOX_W/2, y = t.cy - BOX_H/2;
    const barW = BOX_W - 20;
    html += `<g class="node" onclick="document.getElementById('topic-${t.slug}').scrollIntoView({behavior:'smooth',block:'start'})">
      <rect class="box" x="${x}" y="${y}" width="${BOX_W}" height="${BOX_H}" rx="6"/>
      <text x="${t.cx}" y="${t.cy - 4}">${escapeHtml(t.title)}</text>
      <rect class="prog-bg" x="${x + 10}" y="${y + BOX_H - 12}" width="${barW}" height="3" rx="1.5"/>
      <rect class="prog-fill" x="${x + 10}" y="${y + BOX_H - 12}" width="${barW * pct}" height="3" rx="1.5"/>
    </g>`;
  }
  svg.innerHTML = html;
}

function pad(n) { return String(n).padStart(2, "0"); }

function renderTopics() {
  const main = document.getElementById("topics");
  let html = "";
  TOPICS.forEach((t, ti) => {
    const { solved, total } = topicStats(t);
    const topicDir = `solutions/${pad(ti + 1)}-${t.slug}`;
    html += `<section class="topic" id="topic-${t.slug}">
      <h2><a href="${topicDir}/index.html" style="color:inherit;text-decoration:none">${escapeHtml(t.title)}</a> <span class="count">${solved} / ${total} solved</span></h2>
      <table>
        <thead><tr>
          <th></th><th>#</th><th>Problem</th><th>Difficulty</th><th>Notes</th>
        </tr></thead>
        <tbody>`;
    t.problems.forEach(([num, title, diff, slug, isSolved], pi) => {
      const diffClass = `diff-${diff.toLowerCase()}`;
      const status = isSolved
        ? `<span class="check">✓</span>`
        : `<span class="uncheck">☐</span>`;
      const notesPath = `${topicDir}/${pad(pi + 1)}-${slug}/index.html`;
      html += `<tr class="${isSolved ? "solved" : ""}">
        <td class="status">${status}</td>
        <td class="num">${num}</td>
        <td class="title"><a href="https://leetcode.com/problems/${slug}/" target="_blank">${escapeHtml(title)}</a></td>
        <td class="diff ${diffClass}">${diff}</td>
        <td class="notes"><a href="${notesPath}" title="Walkthrough">📝</a></td>
      </tr>`;
    });
    html += `</tbody></table></section>`;
  });
  main.innerHTML = html;
}

function renderStats() {
  let solved = 0, total = 0, topicsDone = 0;
  for (const t of TOPICS) {
    const s = topicStats(t);
    solved += s.solved; total += s.total;
    if (s.solved === s.total) topicsDone += 1;
  }
  document.getElementById("stats").innerHTML = `
    <span class="pill"><strong>${solved}</strong> <span class="muted">/ ${total} solved</span></span>
    <span class="pill"><strong>${topicsDone}</strong> <span class="muted">/ ${TOPICS.length} topics complete</span></span>
    <span class="pill"><span class="muted">Progress:</span> <strong>${Math.round(100*solved/total)}%</strong></span>
  `;
}

function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

renderTree();
renderTopics();
renderStats();
